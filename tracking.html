<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FlipStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <div class="logo" onclick="window.location='index.html'">
                    <i class="fas fa-bolt"></i>
                    <span>Flip<strong>Store</strong></span>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search for products...">
                    <button onclick="window.location='index.html'"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="btn-header"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="cart.html" class="btn-header">
                        <i class="fas fa-shopping-cart"></i><span>Cart</span>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                    <a href="tracking.html" class="btn-header active-page">
                        <i class="fas fa-truck"></i><span>Orders</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="mobile-nav-btn">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="cart.html" class="mobile-nav-btn">
            <i class="fas fa-shopping-cart"></i><span>Cart</span>
            <span class="mobile-cart-badge" id="mobileCartBadge">0</span>
        </a>
        <a href="tracking.html" class="mobile-nav-btn active">
            <i class="fas fa-truck"></i><span>Orders</span>
        </a>
    </nav>

    <!-- TRACKING CONTENT -->
    <div class="container" style="padding-top: 20px; padding-bottom: 80px;">
        <h2 class="page-title"><i class="fas fa-truck"></i> My Orders</h2>

        <!-- Search Bar -->
        <div class="track-search">
            <input type="text" id="trackInput" placeholder="Enter Order ID (e.g. FS-ABC12) to track">
            <button class="btn-primary" onclick="trackSpecificOrder()">
                <i class="fas fa-search"></i> Track
            </button>
        </div>

        <!-- Orders List -->
        <div id="ordersList"></div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyOrders" style="display:none;">
            <i class="fas fa-box-open"></i>
            <h3>No orders yet!</h3>
            <p>Start shopping to see your orders here</p>
            <a href="index.html" class="btn-primary">Start Shopping</a>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>ABOUT</h4><a href="#">Contact Us</a><a href="#">About Us</a></div>
                <div class="footer-col"><h4>HELP</h4><a href="#">Payments</a><a href="#">Shipping</a></div>
                <div class="footer-col"><h4>POLICY</h4><a href="#">Return Policy</a><a href="#">Privacy</a></div>
                <div class="footer-col"><h4>SOCIAL</h4><a href="#"><i class="fab fa-instagram"></i> Instagram</a></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2024 FlipStore. All rights reserved.</p></div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartBadge();
            renderAllOrders();
        });

        function renderAllOrders() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const container = document.getElementById('ordersList');
            const emptyState = document.getElementById('emptyOrders');

            if (orders.length === 0) {
                emptyState.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = orders.map(order => buildOrderCard(order)).join('');
        }

        function trackSpecificOrder() {
            const input = document.getElementById('trackInput').value.trim().toUpperCase();
            if (!input) { showToast('Please enter an Order ID'); return; }

            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const order = orders.find(o => o.orderId === input);

            if (order) {
                document.getElementById('ordersList').innerHTML = buildOrderCard(order);
                document.getElementById('emptyOrders').style.display = 'none';
                showToast('✅ Order found!');
            } else {
                showToast('❌ Order not found. Check the ID.');
            }
        }

        function buildOrderCard(order) {
            const statusLabels = {
                'confirmed': 'Order Confirmed',
                'shipped': 'Shipped',
                'out-for-delivery': 'Out for Delivery',
                'delivered': 'Delivered'
            };
            const statusSteps = ['confirmed', 'shipped', 'out-for-delivery', 'delivered'];
            const currentStepIndex = statusSteps.indexOf(order.status);

            const stepIcons = {
                'confirmed': 'fa-check',
                'shipped': 'fa-box',
                'out-for-delivery': 'fa-truck',
                'delivered': 'fa-home'
            };

            const trackingDateMap = {
                'confirmed': order.trackingDates?.confirmed,
                'shipped': order.trackingDates?.shipped,
                'out-for-delivery': order.trackingDates?.outForDelivery,
                'delivered': order.trackingDates?.delivered
            };

            return `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-header-left">
                            <h3>Order #${order.orderId}</h3>
                            <p>Placed on ${new Date(order.date).toLocaleDateString('en-IN', {
                                day: 'numeric', month: 'short', year: 'numeric'
                            })}</p>
                        </div>
                        <span class="order-status status-${order.status}">
                            ${statusLabels[order.status]}
                        </span>
                    </div>

                    <div class="order-items-list">
                        ${order.items.map(item => `
                            <div class="order-item-row">
                                <img src="${item.image}" alt="${item.name}"
                                    onerror="this.src='https://via.placeholder.com/60?text=IMG'">
                                <div class="item-info">
                                    <h4>${item.name}</h4>
                                    <p>Qty: ${item.quantity} &nbsp;|&nbsp; ₹${item.itemTotal.toLocaleString()}</p>
                                </div>
                            </div>
                        `).join('')}
                        <div style="text-align:right;padding:10px 0 0;border-top:1px solid var(--border);margin-top:8px;font-size:16px;font-weight:700;">
                            Total: ₹${order.total.toLocaleString()}
                        </div>
                    </div>

                    <div class="tracking-timeline">
                        <h4><i class="fas fa-route" style="color:var(--primary);"></i> Shipment Tracking</h4>
                        <div class="timeline">
                            ${statusSteps.map((step, i) => `
                                <div class="timeline-step ${i <= currentStepIndex ? 'active' : ''}">
                                    <div class="timeline-dot">
                                        <i class="fas ${stepIcons[step]}"></i>
                                    </div>
                                    <div>
                                        <div class="timeline-label">${statusLabels[step]}</div>
                                        <div class="timeline-date">
                                            ${trackingDateMap[step] || (i <= currentStepIndex ? 'Done' : 'Pending')}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="order-footer-info">
                        <div class="order-address-info">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Delivering to: <strong>${order.address.name}</strong> — ${order.address.city}, ${order.address.state}</span>
                        </div>
                        <div class="order-action-buttons">
                            ${order.status !== 'delivered' ? `
                                <button class="btn-primary simulate-btn" onclick="simulateDelivery('${order.orderId}')">
                                    <i class="fas fa-truck"></i> Simulate Delivery
                                </button>
                            ` : `
                                <span class="delivered-badge">
                                    <i class="fas fa-check-circle"></i> Delivered on ${trackingDateMap['delivered']}
                                </span>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function simulateDelivery(orderId) {
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            const order = orders.find(o => o.orderId === orderId);
            if (order && order.status !== 'delivered') {
                const d = new Date();
                const dateStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                order.status = 'delivered';
                if (!order.trackingDates) order.trackingDates = {};
                order.trackingDates.shipped = order.trackingDates.shipped || dateStr;
                order.trackingDates.outForDelivery = order.trackingDates.outForDelivery || dateStr;
                order.trackingDates.delivered = dateStr;
                localStorage.setItem('orders', JSON.stringify(orders));
                renderAllOrders();
                showToast('📦 Order delivered successfully!');
            }
        }
    </script>
</body>
</html>
