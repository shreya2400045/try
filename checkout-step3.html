<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - City & State | FlipShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <a href="index.html" class="logo"><i class="fas fa-bolt"></i> Flip<span>Shop</span></a>
                <div class="search-bar"><input type="text" id="searchInput" placeholder="Search for products"><button id="searchBtn"><i class="fas fa-search"></i></button></div>
                <nav class="header-nav">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>Home</span></a>
                    <a href="products.html" class="nav-link"><i class="fas fa-th-large"></i> <span>Products</span></a>
                    <a href="cart.html" class="nav-link cart-link"><i class="fas fa-shopping-cart"></i> <span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
                    <a href="tracking.html" class="nav-link"><i class="fas fa-truck"></i> <span>Track</span></a>
                </nav>
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <div class="mobile-nav" id="mobileNav">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="products.html"><i class="fas fa-th-large"></i> Products</a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="tracking.html"><i class="fas fa-truck"></i> Track Order</a>
        </div>
    </header>

    <div class="checkout-steps">
        <div class="container">
            <div class="steps-multi">
                <div class="step-m completed"><div class="step-m-icon"><i class="fas fa-check"></i></div><div class="step-m-info"><span class="step-m-label">Step 1</span><span class="step-m-title">Personal</span></div></div>
                <div class="step-m-connector active"></div>
                <div class="step-m completed"><div class="step-m-icon"><i class="fas fa-check"></i></div><div class="step-m-info"><span class="step-m-label">Step 2</span><span class="step-m-title">Address</span></div></div>
                <div class="step-m-connector active"></div>
                <div class="step-m active"><div class="step-m-icon"><i class="fas fa-city"></i></div><div class="step-m-info"><span class="step-m-label">Step 3</span><span class="step-m-title">City & State</span></div></div>
                <div class="step-m-connector"></div>
                <div class="step-m"><div class="step-m-icon"><i class="fas fa-phone-alt"></i></div><div class="step-m-info"><span class="step-m-label">Step 4</span><span class="step-m-title">Contact</span></div></div>
                <div class="step-m-connector"></div>
                <div class="step-m"><div class="step-m-icon"><i class="fas fa-clipboard-check"></i></div><div class="step-m-info"><span class="step-m-label">Step 5</span><span class="step-m-title">Review</span></div></div>
                <div class="step-m-connector"></div>
                <div class="step-m"><div class="step-m-icon"><i class="fas fa-credit-card"></i></div><div class="step-m-info"><span class="step-m-label">Step 6</span><span class="step-m-title">Payment</span></div></div>
            </div>
        </div>
    </div>

    <div class="checkout-page">
        <div class="container">
            <div class="checkout-wizard-layout">
                <div class="wizard-card">
                    <div class="wizard-card-header">
                        <div class="wizard-card-icon"><i class="fas fa-city"></i></div>
                        <div><h2>City, State & Pincode</h2><p>Complete your location details</p></div>
                    </div>
                    <div class="wizard-card-body">
                        <div class="form-group">
                            <label for="city">City <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="fas fa-building"></i>
                                <input type="text" id="city" placeholder="Enter your city">
                            </div>
                            <span class="error-text" id="cityError"></span>
                        </div>
                        <div class="form-group">
                            <label for="state">State <span class="required">*</span></label>
                            <div class="input-icon-wrap select-icon-wrap">
                                <i class="fas fa-map"></i>
                                <select id="state">
                                    <option value="">Select your state</option>
                                    <option>Andhra Pradesh</option><option>Arunachal Pradesh</option>
                                    <option>Assam</option><option>Bihar</option>
                                    <option>Chhattisgarh</option><option>Delhi</option>
                                    <option>Goa</option><option>Gujarat</option>
                                    <option>Haryana</option><option>Himachal Pradesh</option>
                                    <option>Jammu & Kashmir</option><option>Jharkhand</option>
                                    <option>Karnataka</option><option>Kerala</option>
                                    <option>Madhya Pradesh</option><option>Maharashtra</option>
                                    <option>Manipur</option><option>Meghalaya</option>
                                    <option>Mizoram</option><option>Nagaland</option>
                                    <option>Odisha</option><option>Punjab</option>
                                    <option>Rajasthan</option><option>Sikkim</option>
                                    <option>Tamil Nadu</option><option>Telangana</option>
                                    <option>Tripura</option><option>Uttar Pradesh</option>
                                    <option>Uttarakhand</option><option>West Bengal</option>
                                </select>
                            </div>
                            <span class="error-text" id="stateError"></span>
                        </div>
                        <div class="form-group">
                            <label for="pincode">Pincode <span class="required">*</span></label>
                            <div class="input-icon-wrap">
                                <i class="fas fa-map-pin"></i>
                                <input type="text" id="pincode" placeholder="Enter 6-digit pincode" maxlength="6">
                            </div>
                            <span class="error-text" id="pincodeError"></span>
                        </div>
                    </div>
                    <div class="wizard-card-footer">
                        <a href="checkout-step2.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Previous</a>
                        <button class="btn btn-primary" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>
                <div id="orderSidebar"></div>
            </div>
        </div>
    </div>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2024 FlipShop. All rights reserved.</p></div></div></footer>
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="products.html" class="bottom-nav-item"><i class="fas fa-th-large"></i><span>Products</span></a>
        <a href="cart.html" class="bottom-nav-item"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="bottom-badge" id="bottomCartBadge">0</span></a>
        <a href="tracking.html" class="bottom-nav-item"><i class="fas fa-truck"></i><span>Track</span></a>
    </nav>
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            renderCheckoutSidebar('orderSidebar');
            const data = getCheckoutData();
            if (data.city) document.getElementById('city').value = data.city;
            if (data.state) document.getElementById('state').value = data.state;
            if (data.pincode) document.getElementById('pincode').value = data.pincode;

            document.getElementById('nextBtn').addEventListener('click', function() {
                const city = document.getElementById('city').value.trim();
                const state = document.getElementById('state').value;
                const pincode = document.getElementById('pincode').value.trim();
                let valid = true;

                ['cityError','stateError','pincodeError'].forEach(id => document.getElementById(id).textContent = '');
                ['city','state','pincode'].forEach(id => document.getElementById(id).classList.remove('input-error'));

                if (!city) {
                    document.getElementById('cityError').textContent = 'City is required';
                    document.getElementById('city').classList.add('input-error');
                    valid = false;
                }
                if (!state) {
                    document.getElementById('stateError').textContent = 'Please select a state';
                    document.getElementById('state').classList.add('input-error');
                    valid = false;
                }
                if (!pincode || !/^\d{6}$/.test(pincode)) {
                    document.getElementById('pincodeError').textContent = 'Valid 6-digit pincode required';
                    document.getElementById('pincode').classList.add('input-error');
                    valid = false;
                }
                if (valid) {
                    saveCheckoutData({ city, state, pincode });
                    window.location.href = 'checkout-step4.html';
                }
            });
        });
    </script>
</body>
</html>
