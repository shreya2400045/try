<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - FlipShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <a href="index.html" class="logo"><i class="fas fa-bolt"></i> Flip<span>Shop</span></a>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search for products, brands and more">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <nav class="header-nav">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i> <span>Home</span></a>
                    <a href="products.html" class="nav-link"><i class="fas fa-th-large"></i> <span>Products</span></a>
                    <a href="cart.html" class="nav-link active cart-link"><i class="fas fa-shopping-cart"></i> <span>Cart</span><span class="cart-badge" id="cartBadge">0</span></a>
                    <a href="tracking.html" class="nav-link"><i class="fas fa-truck"></i> <span>Track</span></a>
                </nav>
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <div class="mobile-nav" id="mobileNav">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="products.html"><i class="fas fa-th-large"></i> Products</a>
            <a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i> Cart</a>
            <a href="tracking.html"><i class="fas fa-truck"></i> Track Order</a>
        </div>
    </header>

    <div class="cart-page">
        <div class="container">
            <div class="cart-layout" id="cartContent"></div>
            <div class="empty-cart" id="emptyCart" style="display:none;">
                <i class="fas fa-shopping-cart"></i>
                <h2>Your cart is empty!</h2>
                <p>Add items to your cart to continue shopping</p>
                <a href="products.html" class="btn btn-primary">Continue Shopping</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2024 FlipShop. All rights reserved.</p></div></div>
    </footer>

    <nav class="mobile-bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="products.html" class="bottom-nav-item"><i class="fas fa-th-large"></i><span>Products</span></a>
        <a href="cart.html" class="bottom-nav-item active"><i class="fas fa-shopping-cart"></i><span>Cart</span><span class="bottom-badge" id="bottomCartBadge">0</span></a>
        <a href="tracking.html" class="bottom-nav-item"><i class="fas fa-truck"></i><span>Track</span></a>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCart();
            updateCartBadge();
        });

        function renderCart() {
            const { cartItems, totalOriginal, discount, shipping, total, totalQty } = getCartCalculations();

            if (cartItems.length === 0) {
                document.getElementById('cartContent').style.display = 'none';
                document.getElementById('emptyCart').style.display = 'flex';
                return;
            }

            document.getElementById('cartContent').style.display = 'grid';
            document.getElementById('emptyCart').style.display = 'none';

            const products = getProducts();
            let itemsHTML = cartItems.map(item => {
                const originalPrice = Math.round(item.price / (1 - item.discount/100));
                const product = products.find(p => p.id === item.id);
                const sizeIcon = product && product.sizeType === 'shoe' ? 'fa-shoe-prints' :
                                 product && product.sizeType === 'clothing' ? 'fa-tshirt' :
                                 product && product.sizeType === 'waist' ? 'fa-ruler-horizontal' : 'fa-tag';
                return `
                <div class="cart-item">
                    <div class="cart-item-image">
                        <a href="product-detail.html?id=${item.id}">
                            <img src="${item.image}" alt="${item.name}">
                        </a>
                    </div>
                    <div class="cart-item-details">
                        <a href="product-detail.html?id=${item.id}" class="cart-item-name">${item.name}</a>
                        <span class="cart-item-brand">${item.brand}</span>
                        ${item.selectedSize ? `
                            <div class="cart-item-size">
                                <i class="fas ${sizeIcon}"></i>
                                <span>Size: <strong>${item.selectedSize}</strong></span>
                                <a href="product-detail.html?id=${item.id}" class="change-size-link">Change</a>
                            </div>` : ''}
                        <div class="cart-item-price">
                            <span class="current-price">₹${item.price.toLocaleString('en-IN')}</span>
                            <span class="original-price">₹${originalPrice.toLocaleString('en-IN')}</span>
                            <span class="discount-badge">${item.discount}% off</span>
                        </div>
                        <div class="cart-item-qty">
                            <button onclick="updateCartItemQty('${item.cartKey}', ${item.qty - 1}); renderCart(); updateCartBadge();">
                                <i class="fas fa-minus"></i>
                            </button>
                            <span>${item.qty}</span>
                            <button onclick="updateCartItemQty('${item.cartKey}', ${item.qty + 1}); renderCart(); updateCartBadge();">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div class="cart-item-subtotal">Subtotal: <strong>₹${(item.price * item.qty).toLocaleString('en-IN')}</strong></div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart('${item.cartKey}'); renderCart(); updateCartBadge(); showToast('Item removed from cart');">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>`;
            }).join('');

            document.getElementById('cartContent').innerHTML = `
                <div class="cart-items">
                    <div class="cart-header"><h2>Shopping Cart (${totalQty} items)</h2></div>
                    ${itemsHTML}
                </div>
                <div class="cart-summary">
                    <h3>Price Details</h3>
                    <div class="summary-row"><span>Price (${totalQty} items)</span><span>₹${totalOriginal.toLocaleString('en-IN')}</span></div>
                    <div class="summary-row discount"><span>Discount</span><span>-₹${discount.toLocaleString('en-IN')}</span></div>
                    <div class="summary-row"><span>Delivery Charges</span><span class="${shipping === 0 ? 'free-delivery' : ''}">${shipping === 0 ? 'FREE' : '₹' + shipping}</span></div>
                    <div class="summary-divider"></div>
                    <div class="summary-row total"><span>Total Amount</span><span>₹${total.toLocaleString('en-IN')}</span></div>
                    <div class="summary-savings">You will save ₹${discount.toLocaleString('en-IN')} on this order</div>
                    <a href="checkout-step1.html" class="btn btn-primary btn-block btn-lg" style="margin-top:10px;">
                        <i class="fas fa-lock"></i> Proceed to Checkout
                    </a>
                    <a href="products.html" class="btn btn-outline btn-block" style="margin-top:10px;">Continue Shopping</a>
                    <div class="secure-info">
                        <i class="fas fa-shield-alt"></i>
                        <span>Safe and Secure Payments. 100% Authentic products.</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
