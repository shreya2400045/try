<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FlipStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <div class="logo" onclick="window.location='index.html'">
                    <i class="fas fa-bolt"></i>
                    <span>Flip<strong>Store</strong></span>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search for products...">
                    <button onclick="window.location='index.html'"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="btn-header"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="cart.html" class="btn-header active-page">
                        <i class="fas fa-shopping-cart"></i><span>Cart</span>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                    <a href="tracking.html" class="btn-header"><i class="fas fa-truck"></i><span>Orders</span></a>
                </div>
            </div>
        </div>
    </header>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="mobile-nav-btn">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="cart.html" class="mobile-nav-btn active">
            <i class="fas fa-shopping-cart"></i><span>Cart</span>
            <span class="mobile-cart-badge" id="mobileCartBadge">0</span>
        </a>
        <a href="tracking.html" class="mobile-nav-btn">
            <i class="fas fa-truck"></i><span>Orders</span>
        </a>
    </nav>

    <!-- CART CONTENT -->
    <div class="container" style="padding-top: 20px; padding-bottom: 80px;">
        <h2 class="page-title"><i class="fas fa-shopping-cart"></i> My Cart</h2>

        <!-- Empty Cart -->
        <div class="empty-state" id="emptyCart" style="display:none;">
            <i class="fas fa-shopping-cart"></i>
            <h3>Your cart is empty!</h3>
            <p>Add items to get started</p>
            <a href="index.html" class="btn-primary">Shop Now</a>
        </div>

        <!-- Cart Layout -->
        <div class="cart-layout" id="cartLayout">
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-summary" id="cartSummary"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>ABOUT</h4><a href="#">Contact Us</a><a href="#">About Us</a></div>
                <div class="footer-col"><h4>HELP</h4><a href="#">Payments</a><a href="#">Shipping</a></div>
                <div class="footer-col"><h4>POLICY</h4><a href="#">Return Policy</a><a href="#">Privacy</a></div>
                <div class="footer-col"><h4>SOCIAL</h4><a href="#"><i class="fab fa-instagram"></i> Instagram</a></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2024 FlipStore. All rights reserved.</p></div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartBadge();
            renderCart();
        });

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartSummary = document.getElementById('cartSummary');
            const emptyCart = document.getElementById('emptyCart');
            const cartLayout = document.getElementById('cartLayout');

            if (cart.length === 0) {
                cartLayout.style.display = 'none';
                emptyCart.style.display = 'block';
                return;
            }

            cartLayout.style.display = 'grid';
            emptyCart.style.display = 'none';

            let totalPrice = 0, totalOriginal = 0, totalItems = 0;

            cartItems.innerHTML = cart.map(item => {
                const product = products.find(p => p.id === item.id);
                if (!product) return '';
                totalPrice += product.price * item.quantity;
                totalOriginal += product.originalPrice * item.quantity;
                totalItems += item.quantity;
                return `
                    <div class="cart-item">
                        <img class="cart-item-img" src="${product.image}" alt="${product.name}"
                            onclick="window.location='product.html?id=${product.id}'">
                        <div class="cart-item-details">
                            <h3>${product.name}</h3>
                            <p class="brand">${product.brand}</p>
                            <div class="cart-item-price">
                                <span class="price-current">₹${product.price.toLocaleString()}</span>
                                <span class="price-original">₹${product.originalPrice.toLocaleString()}</span>
                                <span class="price-discount">${product.discount}% off</span>
                            </div>
                            <div class="cart-quantity">
                                <button onclick="changeQty(${item.id}, -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                            <div class="cart-item-actions">
                                <button onclick="removeItem(${item.id})"><i class="fas fa-trash"></i> Remove</button>
                                <button onclick="window.location='product.html?id=${product.id}'">
                                    <i class="fas fa-eye"></i> View Details
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const savings = totalOriginal - totalPrice;
            const delivery = totalPrice > 500 ? 0 : 40;
            const finalTotal = totalPrice + delivery;

            cartSummary.innerHTML = `
                <h3>Price Details</h3>
                <div class="summary-row">
                    <span>Price (${totalItems} items)</span>
                    <span>₹${totalOriginal.toLocaleString()}</span>
                </div>
                <div class="summary-row discount">
                    <span>Discount</span>
                    <span>- ₹${savings.toLocaleString()}</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Charges</span>
                    <span style="color:${delivery === 0 ? 'var(--success)' : 'inherit'}">
                        ${delivery === 0 ? 'FREE' : '₹' + delivery}
                    </span>
                </div>
                <div class="summary-row total">
                    <span>Total Amount</span>
                    <span>₹${finalTotal.toLocaleString()}</span>
                </div>
                <div class="summary-savings">You will save ₹${savings.toLocaleString()} on this order 🎉</div>
                <a href="shipping.html" class="btn-primary btn-full" style="margin-top:12px; text-decoration:none; display:flex; justify-content:center;">
                    <i class="fas fa-lock"></i> PLACE ORDER
                </a>
            `;
        }

        function changeQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            saveCart();
            updateCartBadge();
            renderCart();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
            updateCartBadge();
            renderCart();
            showToast('Item removed from cart');
        }
    </script>
</body>
</html>
