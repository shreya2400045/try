<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - FlipStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-top">
            <div class="container header-flex">
                <div class="logo" onclick="window.location='index.html'">
                    <i class="fas fa-bolt"></i>
                    <span>Flip<strong>Store</strong></span>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search for products...">
                    <button onclick="window.location='index.html'"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="btn-header"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="cart.html" class="btn-header">
                        <i class="fas fa-shopping-cart"></i><span>Cart</span>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                    <a href="tracking.html" class="btn-header"><i class="fas fa-truck"></i><span>Orders</span></a>
                </div>
            </div>
        </div>
    </header>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-bottom-nav">
        <a href="index.html" class="mobile-nav-btn">
            <i class="fas fa-home"></i><span>Home</span>
        </a>
        <a href="cart.html" class="mobile-nav-btn">
            <i class="fas fa-shopping-cart"></i><span>Cart</span>
            <span class="mobile-cart-badge" id="mobileCartBadge">0</span>
        </a>
        <a href="tracking.html" class="mobile-nav-btn">
            <i class="fas fa-truck"></i><span>Orders</span>
        </a>
    </nav>

    <!-- PRODUCT DETAIL -->
    <div class="container" style="padding-top: 20px; padding-bottom: 60px;">
        <div class="breadcrumb" id="breadcrumb">
            <a href="index.html">Home</a> / <span id="breadcrumbProduct">Product</span>
        </div>
        <div id="productDetail" class="product-detail"></div>

        <!-- RELATED PRODUCTS -->
        <div class="section" style="margin-top: 40px;">
            <div class="section-header">
                <h2>Similar Products</h2>
            </div>
            <div class="products-scroll" id="relatedProducts"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>ABOUT</h4>
                    <a href="#">Contact Us</a>
                    <a href="#">About Us</a>
                </div>
                <div class="footer-col">
                    <h4>HELP</h4>
                    <a href="#">Payments</a>
                    <a href="#">Shipping</a>
                </div>
                <div class="footer-col">
                    <h4>POLICY</h4>
                    <a href="#">Return Policy</a>
                    <a href="#">Privacy</a>
                </div>
                <div class="footer-col">
                    <h4>SOCIAL</h4>
                    <a href="#"><i class="fab fa-instagram"></i> Instagram</a>
                    <a href="#"><i class="fab fa-youtube"></i> YouTube</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 FlipStore. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartBadge();
            const params = new URLSearchParams(window.location.search);
            const productId = parseInt(params.get('id'));
            if (productId) {
                loadProduct(productId);
            } else {
                window.location.href = 'index.html';
            }
        });

        function loadProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) { window.location.href = 'index.html'; return; }

            document.title = `${product.name} - FlipStore`;
            document.getElementById('breadcrumbProduct').textContent = product.name;

            document.getElementById('productDetail').innerHTML = `
                <div class="pd-image-container">
                    <img class="pd-main-image" id="pdMainImage" src="${product.image}" alt="${product.name}">
                    <div class="pd-thumbnails">
                        ${product.images.map((img, i) => `
                            <img class="pd-thumb ${i === 0 ? 'active' : ''}" src="${img}"
                                onclick="changeProductImage('${img}', this)" alt="View ${i+1}">
                        `).join('')}
                    </div>
                </div>
                <div class="pd-info">
                    <p class="product-brand">${product.brand}</p>
                    <h1>${product.name}</h1>
                    <div class="pd-rating-row">
                        <span class="product-rating">${product.rating} <i class="fas fa-star"></i></span>
                        <span class="rating-count">${product.ratingCount.toLocaleString()} Ratings & Reviews</span>
                    </div>
                    <div class="pd-price-box">
                        <div class="product-price">
                            <span class="price-current">₹${product.price.toLocaleString()}</span>
                            <span class="price-original">₹${product.originalPrice.toLocaleString()}</span>
                            <span class="price-discount">${product.discount}% off</span>
                        </div>
                        <p style="font-size:12px;color:var(--text-light);margin-top:4px;">Inclusive of all taxes</p>
                    </div>
                    <div class="pd-features">
                        <h3>Highlights</h3>
                        <ul>${product.features.map(f => `<li>${f}</li>`).join('')}</ul>
                    </div>
                    <div class="pd-actions">
                        <button class="btn-add-cart" onclick="addToCartAndNotify(${product.id})">
                            <i class="fas fa-shopping-cart"></i> ADD TO CART
                        </button>
                        <button class="btn-buy-now" onclick="buyNow(${product.id})">
                            <i class="fas fa-bolt"></i> BUY NOW
                        </button>
                    </div>
                    <div class="pd-delivery-info">
                        <div class="info-item"><i class="fas fa-truck"></i><span>Free Delivery by <strong>${getDeliveryDate()}</strong></span></div>
                        <div class="info-item"><i class="fas fa-undo"></i><span>7 Days Replacement Policy</span></div>
                        <div class="info-item"><i class="fas fa-shield-alt"></i><span>1 Year Warranty</span></div>
                        <div class="info-item"><i class="fas fa-money-bill-wave"></i><span>Cash on Delivery available</span></div>
                    </div>
                </div>
            `;

            // Related products
            const related = products.filter(p => p.category === product.category && p.id !== id).slice(0, 8);
            document.getElementById('relatedProducts').innerHTML = related.map(p => createProductCard(p)).join('');
        }

        function addToCartAndNotify(id) {
            addToCart(id);
            updateCartBadge();
            showToast('Added to cart! 🛒');
        }

        function buyNow(id) {
            addToCart(id);
            updateCartBadge();
            window.location.href = 'cart.html';
        }

        function changeProductImage(src, thumb) {
            document.getElementById('pdMainImage').src = src;
            document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
        }

        function getDeliveryDate() {
            const d = new Date();
            d.setDate(d.getDate() + 4);
            return d.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
        }
    </script>
</body>
</html>
